    <meta charset="UTF-8">

  <section> 
    <div id="head" class="flex_row">

    
      <div class="flex_column">
        <h2> Jury vs. Televote </h2>

        <div class="flex_row reduced_gap ">
          <svg class="legend" >
            <rect  >
            </rect>
          </svg>
          <p> Jury</p>
        </div>

        <div class="flex_row reduced_gap">
          <svg class="legend" >
            <rect id="tv">
            </rect>
          </svg>
          <p> Televote</p>
        </div>
      </div>

      <div class="flex_column">
        <h2> Plot by </h2>
        <div class="flex_row reduced_gap"> 
          <input type="radio" name="plotby" id="rplottot" class="button" checked >
          <label for="rplottot" > Total Points</label> 
          <input type="radio" name="plotby" id="rplotdif" class="button">
          <label for="rplotdif" > Controversy</label>    
          <input type="radio" name="plotby" id="rplotcountry" class="button">
          <label for="rplotcountry"> Country </label>  
        </div>
      </div>

      <div class="flex_column">
        <h2> Year </h2>
        <div class="flex_row reduced_gap">
          <input type="checkbox" name='2016' id='cb2016' checked >
          <label for="cb2016" class="cblab ">2016</label>
          <input type="checkbox" name='2017'id='cb2017' checked  >
          <label for="cb2017" class="cblab ">2017</label>
          <input type="checkbox" name="2018" id ='cb2018' checked>
          <label for="cb2018" class="cblab">2018</label>
          <input type="checkbox" name="2019" id ='cb2019' checked>
          <label for="cb2019" class="cblab">2019</label>
          <input type="checkbox" name="2020" id ='cb2020' checked>
          <label for="cb2020" class="cblab">2020</label>
          <input type="checkbox" name="2021" id ='cb2021' checked>
          <label for="cb2021" class="cblab">2021</label>
          <input type="checkbox" name="2022" id ='cb2022' checked>
          <label for="cb2022"class="cblab">2022</label>
          <input type="checkbox" name="2023" id ='cb2023' checked>
          <label for="cb2023" class="cblab">2023</label> 
        </div>
      </div>

    </div>
      
    
    
    

    

    <div id="vis">
      <svg id="datavis"></svg>
    </div>
  </section>
  



  

  <div id="tooltip">
    <div class="flex_column xs_gap">
      <div> <div id="country" ></div> </div>
      <div id="song" ></div>
      <div id="artist" ></div>  
    </div>
